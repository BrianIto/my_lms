name: my-lms-prod

services:
  backend:
    build:
      context: ../backend-go
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      ENV: ${ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-app}?sslmode=disable
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-lms-backend}
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS:-https://learning.brianito.com,https://auth.brianito.com}
    networks:
      - internal
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${TRAEFIK_NETWORK:-traefik-public}
      traefik.http.routers.lms-backend.rule: Host(`${API_HOST:-api.brianito.com}`)
      traefik.http.routers.lms-backend.entrypoints: websecure
      traefik.http.routers.lms-backend.tls: "true"
      traefik.http.routers.lms-backend.tls.certresolver: ${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      traefik.http.routers.lms-backend.middlewares: lms-secure-headers@docker,lms-compress@docker
      traefik.http.services.lms-backend.loadbalancer.server.port: "8080"
      traefik.http.services.lms-backend.loadbalancer.healthcheck.path: /health
      traefik.http.services.lms-backend.loadbalancer.healthcheck.interval: 30s
      traefik.http.middlewares.lms-compress.compress: "true"
      traefik.http.middlewares.lms-secure-headers.headers.stsSeconds: "31536000"
      traefik.http.middlewares.lms-secure-headers.headers.stsIncludeSubdomains: "true"
      traefik.http.middlewares.lms-secure-headers.headers.stsPreload: "true"
      traefik.http.middlewares.lms-secure-headers.headers.contentTypeNosniff: "true"
      traefik.http.middlewares.lms-secure-headers.headers.referrerPolicy: strict-origin-when-cross-origin
      traefik.http.middlewares.lms-secure-headers.headers.permissionsPolicy: camera=(), microphone=(), geolocation=()

  auth:
    build:
      context: ../auth_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${AUTH_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-app}?sslmode=disable
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-public}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://auth.brianito.com}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-https://learning.brianito.com,https://api.brianito.com,https://auth.brianito.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BETA_REQUEST_FROM: "${BETA_REQUEST_FROM:-Brianito Learning <noreply@brianito.com>}"
      BETA_REQUEST_ADMIN_EMAIL: ${BETA_REQUEST_ADMIN_EMAIL:-contact@brianito.com}
      BETA_REQUEST_APPROVAL_BASE_URL: ${BETA_REQUEST_APPROVAL_BASE_URL:-https://auth.brianito.com}
      OTEL_SERVICE_NAME: ${OTEL_AUTH_SERVICE_NAME:-lms-auth}
    networks:
      - internal
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${TRAEFIK_NETWORK:-traefik-public}
      traefik.http.routers.lms-auth.rule: Host(`${AUTH_HOST:-auth.brianito.com}`)
      traefik.http.routers.lms-auth.entrypoints: websecure
      traefik.http.routers.lms-auth.tls: "true"
      traefik.http.routers.lms-auth.tls.certresolver: ${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      traefik.http.routers.lms-auth.middlewares: lms-secure-headers@docker,lms-compress@docker
      traefik.http.services.lms-auth.loadbalancer.server.port: "3000"
      traefik.http.services.lms-auth.loadbalancer.healthcheck.path: /api/auth/ok
      traefik.http.services.lms-auth.loadbalancer.healthcheck.interval: 30s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/auth/ok').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-migrate:
    image: postgres:16-alpine
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-app}?sslmode=disable
    volumes:
      - ../backend-go/internal/db/migrations:/migrations:ro
    networks:
      - internal
    entrypoint: ["/bin/sh", "-lc"]
    command: |
      set -eu
      for file in /migrations/*.up.sql; do
        echo "Applying $${file}"
        psql "$${DATABASE_URL}" -v ON_ERROR_STOP=1 -f "$${file}"
      done

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    restart: unless-stopped
    command: ["--config=/etc/otel-collector/config.yml"]
    volumes:
      - ./otel/otel-collector.prod.yml:/etc/otel-collector/config.yml:ro
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=1GB
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - internal
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - internal
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  internal:
    driver: bridge
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-public}
