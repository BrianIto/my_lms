basePath: /
definitions:
  backend-go_internal_service.Course:
    properties:
      description:
        type: string
      id:
        type: string
      modules:
        items:
          $ref: '#/definitions/backend-go_internal_service.Module'
        type: array
      progress:
        type: integer
      slug:
        type: string
      status:
        $ref: '#/definitions/backend-go_internal_service.CourseStatus'
      title:
        type: string
    type: object
  backend-go_internal_service.CourseProgress:
    properties:
      completed_lessons:
        type: integer
      course_slug:
        type: string
      percent:
        type: integer
      total_lessons:
        type: integer
    type: object
  backend-go_internal_service.CourseStatus:
    enum:
    - draft
    - beta
    - published
    type: string
    x-enum-varnames:
    - CourseStatusDraft
    - CourseStatusBeta
    - CourseStatusPublished
  backend-go_internal_service.Lesson:
    properties:
      duration_seconds:
        type: integer
      id:
        type: string
      status:
        $ref: '#/definitions/backend-go_internal_service.LessonStatus'
      title:
        type: string
      youtube_embed_url:
        type: string
    type: object
  backend-go_internal_service.LessonProgressUpdate:
    properties:
      status:
        $ref: '#/definitions/backend-go_internal_service.LessonStatus'
    type: object
  backend-go_internal_service.LessonStatus:
    enum:
    - not_started
    - in_progress
    - completed
    type: string
    x-enum-varnames:
    - LessonStatusNotStarted
    - LessonStatusInProgress
    - LessonStatusCompleted
  backend-go_internal_service.Module:
    properties:
      id:
        type: string
      lessons:
        items:
          $ref: '#/definitions/backend-go_internal_service.Lesson'
        type: array
      title:
        type: string
    type: object
  backend-go_pkg_response.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_handler.AccessResponse:
    properties:
      authenticated:
        example: true
        type: boolean
      beta_access:
        example: true
        type: boolean
      status:
        example: active
        type: string
    type: object
  internal_handler.BetaAccessRequestBody:
    properties:
      email:
        example: student@example.com
        type: string
    type: object
  internal_handler.BetaAccessRequestResponse:
    properties:
      email:
        example: student@example.com
        type: string
      message:
        example: Beta access request received.
        type: string
      status:
        example: requested
        type: string
    type: object
  internal_handler.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
info:
  contact: {}
  description: Production-ready Go backend with chi, PostgreSQL, Redis, OpenTelemetry,
    WebSockets, Swaggo, and Scalar.
  title: Go Backend Server
  version: "1.0"
paths:
  /api/v1/beta-access-requests:
    post:
      consumes:
      - application/json
      description: Accepts a public beta-access request for the Agentic Engineering
        Course. This records interest only and does not grant private course access.
      parameters:
      - description: Beta access request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.BetaAccessRequestBody'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_handler.BetaAccessRequestResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend-go_pkg_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/backend-go_pkg_response.ErrorResponse'
      summary: Request beta access
      tags:
      - access
  /api/v1/courses:
    get:
      description: Lists cacheable course catalog data.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/backend-go_internal_service.Course'
            type: array
      summary: List courses
      tags:
      - courses
  /api/v1/courses/{slug}:
    get:
      description: Gets cacheable course detail data by slug.
      parameters:
      - description: Course slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend-go_internal_service.Course'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/backend-go_pkg_response.ErrorResponse'
      summary: Get course
      tags:
      - courses
  /api/v1/courses/{slug}/progress:
    get:
      description: Gets per-user course progress. Development placeholder uses seeded
        progress.
      parameters:
      - description: Course slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend-go_internal_service.CourseProgress'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/backend-go_pkg_response.ErrorResponse'
      summary: Get course progress
      tags:
      - progress
  /api/v1/lessons/{lessonID}/progress:
    post:
      consumes:
      - application/json
      description: Idempotently updates lesson progress for the authenticated user.
        Development placeholder echoes the normalized status.
      parameters:
      - description: Lesson ID
        in: path
        name: lessonID
        required: true
        type: string
      - description: Progress payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend-go_internal_service.LessonProgressUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend-go_internal_service.LessonProgressUpdate'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend-go_pkg_response.ErrorResponse'
      summary: Update lesson progress
      tags:
      - progress
  /api/v1/me/access:
    get:
      description: Returns session/beta access state for the current user. This is
        a development placeholder until Better Auth session validation is wired.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.AccessResponse'
      summary: Get current access state
      tags:
      - access
  /health:
    get:
      description: Returns service health.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.HealthResponse'
      summary: Health check
      tags:
      - ops
schemes:
- http
- https
swagger: "2.0"
